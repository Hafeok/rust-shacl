# cargo-deny configuration — supply-chain checks (advisories, licenses, bans, sources).
# Run locally with: cargo deny check
# CI runs the same on every push/PR (.github/workflows/ci.yml).

[advisories]
version = 2
# Known-vulnerable crates fail the build; yanked crates only warn (resolving a
# yank is a `cargo update`, not a security fix, and may not belong on the same change).
yanked = "warn"
ignore = []

[licenses]
version = 2
# Permissive licenses only. The oxigraph/oxrdf stack and the rest of the tree are
# all MIT / Apache-2.0 / BSD / Unicode / Zlib; a new license type needs a deliberate PR.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "Unlicense",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are common in a large tree; warn rather than fail.
multiple-versions = "warn"
# Wildcard version requirements are surfaced as warnings, not failures: the only ones
# in this tree are our internal `crate.workspace = true` path deps (which legitimately
# carry no version and reach cargo-deny via workspace inheritance, where
# `allow-wildcard-paths` can't see them). External deps all use proper semver.
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"

[sources]
# Everything comes from crates.io; reject unknown registries / git sources.
unknown-registry = "deny"
unknown-git = "deny"
