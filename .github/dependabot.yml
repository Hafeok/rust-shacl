version: 2
updates:
  # Rust dependencies (the workspace Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      oxigraph-stack:
        patterns: ["ox*"] # oxrdf / oxttl / oxigraph / oxsdatatypes move together

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
